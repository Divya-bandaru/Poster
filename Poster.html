<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farewell Premiere</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
}

#intro{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle,#111,#000);
    color:#f7d26a;
}

.logo{
    font-size:70px;
    animation:glow 2s infinite alternate;
    margin-bottom:20px;
}

@keyframes glow{
from{
text-shadow:0 0 10px gold;
}
to{
text-shadow:0 0 40px gold,0 0 70px orange;
}
}

.title{
    font-size:48px;
    letter-spacing:5px;
    margin-bottom:15px;
    text-align:center;
}

.subtitle{
    color:#ddd;
    font-size:22px;
    margin-bottom:50px;
    text-align:center;
}

button{
    padding:18px 50px;
    border:none;
    border-radius:40px;
    background:linear-gradient(45deg,#ffb300,#ff6f00);
    color:white;
    font-size:22px;
    cursor:pointer;
    transition:.4s;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px gold;
}

#poster{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:black;
}

#poster img{
    max-width:92vw;
    max-height:94vh;
    border-radius:12px;
    transform:scale(.2);
    opacity:0;
    transition:1.5s;
    box-shadow:0 0 60px rgba(255,200,0,.7);
}

.flash{
    position:fixed;
    inset:0;
    background:white;
    opacity:0;
    pointer-events:none;
}

.spark{
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    background:gold;
    animation:float linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-100px);
opacity:0;
}
}
</style>
</head>

<body>

<div id="intro">

<div class="logo">⭐</div>

<div class="title">
PREMIERE NIGHT
</div>

<div class="subtitle">
One Click. One Memory. One Beautiful Farewell.
</div>

<button onclick="reveal()">
🎬 ENTER THE PREMIERE
</button>

</div>

<div class="flash" id="flash"></div>

<div id="poster">
<img src="poster.png" id="img">
</div>

<!-- Background Music -->
<audio id="bgMusic" preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

// Floating Golden Particles
for(let i=0;i<120;i++){

let s=document.createElement("div");

s.className="spark";

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDuration=(3+Math.random()*4)+"s";
s.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(s);

}

// Reveal Function
function reveal(){

// Start Music
let music=document.getElementById("bgMusic");

music.volume=0;

music.play();

let fade=setInterval(function(){

if(music.volume<0.5){

music.volume=Math.min(music.volume+0.05,0.5);

}else{

clearInterval(fade);

}

},200);

// Hide Intro
document.getElementById("intro").style.display="none";

// Flash Effect
let f=document.getElementById("flash");

f.style.transition=".4s";

f.style.opacity="1";

setTimeout(function(){

f.style.opacity="0";

},350);

// Show Poster
let p=document.getElementById("poster");

p.style.display="flex";

setTimeout(function(){

let img=document.getElementById("img");

img.style.opacity="1";

img.style.transform="scale(1)";

},300);

}
</script>

</body>
</html>
